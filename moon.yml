# https://moonrepo.dev/docs/config/project
id: "portfolio"
language: "unknown" # Mixed/Polyglot

fileGroups:
  go: ["go/**/*"]
  sveltekit:
    [
      "sveltekit/**/*",
      "!sveltekit/node_modules/**",
      "!sveltekit/dist/**",
      "**/.*/**",
    ]
  ts: ["ts/**/*", "!ts/node_modules/**", "**/.*/**"]

tasks:
  # Go Backend
  go-build:
    command: "go build -v ./go/..."
    inputs: ["go/**/*"]
    platform: "system"

  go-test:
    command: "go test -v ./go/..."
    inputs: ["go/**/*", "!go/goa_gen/**"]
    platform: "system"

  go-lint:
    deps: ["portfolio-go:lint"]
    platform: "system"
    options:
      mergeInputs: "replace"

  go-format:
    command: "goimports -w ./go"
    inputs: ["go/**/*"]
    options:
      mergeArgs: "replace"
      mergeInputs: "replace"

  go-run:
    command: "cd go && go run ."
    inputs: ["go/**/*"]
    platform: "system"
    local: true

  goa-gen:
    command: "cd go && goa gen github.com/reidlai/ta-workspace/modules/portfolio/go/design"
    inputs: ["go/design/**/*"]
    platform: "system"

  # Svelte Frontend
  sveltekit-dev:
    deps: ["portfolio-sveltekit:dev"]
    local: true
    platform: "node"

  sveltekit-build:
    deps: ["portfolio-sveltekit:build"]
    platform: "node"

  sveltekit-sync:
    deps: ["portfolio-sveltekit:sync"]
    platform: "node"
    local: true
    options:
      runInCI: true
      persistent: false

  sveltekit-check:
    deps: ["portfolio-sveltekit:check"]
    platform: "node"

  sveltekit-test:
    deps: ["portfolio-sveltekit:test"]
    platform: "node"

  sveltekit-lint:
    deps: ["portfolio-sveltekit:lint"]
    platform: "system"
    options:
      mergeInputs: "replace"

  sveltekit-format:
    deps: ["portfolio-sveltekit:format"]
    platform: "system"
    inputs: ["moon.yml"]
    options:
      mergeInputs: "replace"

  svelte-storybook:
    deps: ["portfolio-sveltekit:storybook"]
    platform: "node"
    local: true

  # Composite Tasks
  build:
    command: 'echo "Building all components"'
    deps: ["go-build", "sveltekit-build"]
    platform: "system"
    outputs: []
    options:
      mergeArgs: "replace"
      mergeInputs: "replace"
      mergeOutputs: "replace"

  test:
    command: 'echo "Testing all components"'
    deps: ["go-test", "sveltekit-test", "sveltekit-check"]
    platform: "system"
    outputs: []
    options:
      mergeArgs: "replace"
      mergeOutputs: "replace"

  lint:
    command: 'echo "Linting all components"'
    deps: ["go-lint", "sveltekit-lint"]
    platform: "system"
    inputs: ["moon.yml"]
    outputs: []
    options:
      mergeArgs: "replace"
      mergeInputs: "replace"
      mergeOutputs: "replace"

  format:
    command: 'echo "Formatting all components"'
    deps: ["go-format", "sveltekit-format"]
    platform: "system"
    inputs: ["moon.yml"]
    outputs: []
    options:
      mergeArgs: "replace"
      mergeInputs: "replace"
      mergeOutputs: "replace"

  storybook:
    deps: ["sveltekit-storybook"]
    local: true
    platform: "system"
