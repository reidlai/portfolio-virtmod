$schema: "https://moonrepo.dev/schemas/project.json"
id: "portfolio-go"
layer: "library"
stack: "backend"

tasks:
  build:
    command: "go build ./..."
    inputs:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
    outputs: []
    options:
      mergeArgs: "replace"
      mergeOutputs: "replace"
      mergeInputs: "replace"

  format:
    command: "goimports"
    args:
      - "-w"
      - "."
    inputs:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "!**/.*/**"
    toolchain: "system"
    options:
      mergeArgs: "replace"
      mergeInputs: "replace"

  lint:
    command: "golangci-lint"
    args:
      - "run"
      - "-v"
      - "--allow-parallel-runners"
    inputs:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "!**/.*/**"
    options:
      mergeArgs: "replace"
      mergeInputs: "replace"

  test:
    command: "go test ./pkg/... ./internal/..."
    inputs:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
    options:
      runInCI: true
      mergeArgs: "replace"
      mergeInputs: "replace"

  goa-gen:
    command: "go run goa.design/goa/v3/cmd/goa@latest gen github.com/reidlai/ta-workspace/modules/portfolio/go/design --output goa_gen"
    inputs:
      - "design/**/*.go"
      - "go.mod"
    outputs:
      - "goa_gen/**"
    options:
      mergeArgs: "replace"
      mergeInputs: "replace"

  build-server:
    command: "go build -o bin/portfolio-server ."
    inputs:
      - "main.go"
      - "cmd/**/*.go"
      - "pkg/**/*.go"
      - "gen/**/*.go"
      - "go.mod"
      - "go.sum"
    outputs:
      - "bin/portfolio-server"

  start:
    command: "./bin/portfolio-server api-server start"
    deps:
      - "build-server"
    preset: "server"
